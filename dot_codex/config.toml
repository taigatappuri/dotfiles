#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

persistent_instructions = "Follow project AGENTS.md guidelines."
model_reasoning_effort = "medium"

[features]
codex_hooks = false
multi_agent = false

# MCP は必要なときだけ個別に有効化する。
[mcp_servers.github]
enabled = false
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30.0

[mcp_servers.context7]
enabled = false
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30.0

[mcp_servers.exa]
enabled = false
url = "https://mcp.exa.ai/mcp"

[mcp_servers.memory]
enabled = false
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 30.0

[mcp_servers.playwright]
enabled = false
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
startup_timeout_sec = 30.0

[mcp_servers.sequential-thinking]
enabled = false
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 30.0

[mcp_servers.supabase]
enabled = false
command = "bunx"
args = ["@supabase/mcp-server-supabase@latest", "--features=account,docs,database,debugging,development,functions,storage,branching"]
startup_timeout_sec = 20.0
tool_timeout_sec = 120.0

[mcp_servers.aegis]
enabled = false
command = "npx"
args = ["-y", "@fuwasegu/aegis", "--surface", "agent"]

[mcp_servers.aegis-admin]
enabled = false
command = "npx"
args = ["-y", "@fuwasegu/aegis", "--surface", "admin"]

[mcp_servers.chrome-devtools]
enabled = false
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--headless", "--isolated", "--no-usage-statistics", "--no-performance-crux"]

[plugins."superpowers@openai-curated"]
enabled = false

[plugins."github@openai-curated"]
enabled = false

[plugins."hugging-face@openai-curated"]
enabled = false

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"
model_reasoning_effort = "low"
